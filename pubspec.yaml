name: popupmate
description: "PopupMate mobile app rebuilt with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_svg: ^2.2.2
  go_router: ^17.0.0
  intl: ^0.20.2
  lucide_icons_flutter: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
  fonts:
    - family: MoneygraphyRounded
      fonts:
        - asset: assets/fonts/Moneygraphy-Rounded.ttf
    - family: MoveSans
      fonts:
        - asset: assets/fonts/MoveSans-Bold.ttf
          weight: 700
    - family: SUITE
      fonts:
        - asset: assets/fonts/SUITE-Variable.ttf
